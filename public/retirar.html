<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FilaPro - Retirar Senha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background: #070913;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
    }
    .retirar-container {
      width: 100%;
      max-width: 480px;
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .retirar-header {
      margin-bottom: 2rem;
    }
    .retirar-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .retirar-header p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }
    .store-badge {
      display: inline-block;
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.3);
      color: #38bdf8;
      padding: 0.4rem 1.2rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.75rem;
    }
    .sector-buttons-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .sector-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 1.25rem 1.5rem;
      border-radius: var(--border-radius-lg);
      border: 1px solid var(--border-glass);
      background: rgba(255, 255, 255, 0.03);
      color: #fff;
      font-size: 1.2rem;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }
    .sector-btn::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 6px;
      transition: transform 0.3s;
    }
    .sector-btn-content {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .sector-btn i.sector-icon {
      font-size: 1.5rem;
      width: 24px;
      text-align: center;
    }
    .sector-btn i.arrow-icon {
      font-size: 1rem;
      opacity: 0.5;
      transition: transform 0.3s;
    }
    
    /* Cores dos Setores */
    .sector-btn.acougue::before { background: var(--color-acougue); }
    .sector-btn.acougue i.sector-icon { color: var(--color-acougue); }
    .sector-btn.acougue:hover {
      background: rgba(239, 68, 68, 0.08);
      border-color: rgba(239, 68, 68, 0.4);
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.15);
    }
    
    .sector-btn.padaria::before { background: var(--color-padaria); }
    .sector-btn.padaria i.sector-icon { color: var(--color-padaria); }
    .sector-btn.padaria:hover {
      background: rgba(245, 158, 11, 0.08);
      border-color: rgba(245, 158, 11, 0.4);
      box-shadow: 0 10px 25px rgba(245, 158, 11, 0.15);
    }

    .sector-btn.rotisseria::before { background: var(--color-rotisseria); }
    .sector-btn.rotisseria i.sector-icon { color: var(--color-rotisseria); }
    .sector-btn.rotisseria:hover {
      background: rgba(249, 115, 22, 0.08);
      border-color: rgba(249, 115, 22, 0.4);
      box-shadow: 0 10px 25px rgba(249, 115, 22, 0.15);
    }

    .sector-btn.frios::before { background: var(--color-frios); }
    .sector-btn.frios i.sector-icon { color: var(--color-frios); }
    .sector-btn.frios:hover {
      background: rgba(234, 179, 8, 0.08);
      border-color: rgba(234, 179, 8, 0.4);
      box-shadow: 0 10px 25px rgba(234, 179, 8, 0.15);
    }

    .sector-btn.peixaria::before { background: var(--color-peixaria); }
    .sector-btn.peixaria i.sector-icon { color: var(--color-peixaria); }
    .sector-btn.peixaria:hover {
      background: rgba(6, 182, 212, 0.08);
      border-color: rgba(6, 182, 212, 0.4);
      box-shadow: 0 10px 25px rgba(6, 182, 212, 0.15);
    }

    .sector-btn:hover i.arrow-icon {
      transform: translateX(5px);
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="retirar-container">
    <div class="retirar-header">
      <h1>FilaPro</h1>
      <p>Escolha um setor para retirar sua senha</p>
      <div id="store-title" class="store-badge">Carregando loja...</div>
    </div>

    <div class="sector-buttons-list" id="sectors-list">
      <!-- Injetado dinamicamente via JS -->
      <div style="padding: 2rem; color: var(--text-muted);">Carregando setores disponíveis...</div>
    </div>

    <!-- Acompanhar Senha Física -->
    <div class="glass-card" style="margin-top: 2rem; padding: 1.5rem; text-align: left; max-width: 100%;">
      <div id="btn-toggle-physical-area" style="text-align: center; cursor: pointer;">
        <p style="color: var(--text-secondary); margin: 0; font-size: 0.95rem; font-weight: 600;">
          <i class="fa-solid fa-ticket" style="margin-right: 0.5rem; color: #38bdf8;"></i>
          Já possui uma senha física (balança / impressa)?
        </p>
        <span style="color: #38bdf8; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; margin-top: 0.5rem; display: inline-block;">Acompanhar no Celular</span>
      </div>

      <div id="form-physical-area" style="display: none; margin-top: 1rem; border-top: 1px solid var(--border-glass); padding-top: 1rem;">
        <form id="form-track-physical">
          <div class="form-group" style="margin-bottom: 1rem;">
            <label for="select-physical-sector" style="font-size: 0.8rem; margin-bottom: 0.25rem;">Selecione o Setor</label>
            <select id="select-physical-sector" required style="padding: 0.75rem; font-size: 0.9rem;">
              <!-- Populado via JS -->
            </select>
          </div>
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <label for="input-physical-number" style="font-size: 0.8rem; margin-bottom: 0.25rem;">Número da Senha</label>
            <input type="number" id="input-physical-number" placeholder="Ex: 45" required min="1" style="padding: 0.75rem; font-size: 0.9rem;">
          </div>
          <button type="submit" class="btn btn-primary" style="padding: 0.75rem; font-size: 0.95rem;">
            <i class="fa-solid fa-eye"></i> Acompanhar Atendimento
          </button>
        </form>
      </div>
    </div>

    <footer style="color: var(--text-muted); font-size: 0.85rem; margin-top: 2rem;">
      FilaPro © 2026 - Central de Autoatendimento
    </footer>
  </div>

  <script>
    const pathParts = window.location.pathname.split('/');
    const storeSlug = pathParts[2] || '';

    if (!storeSlug) {
      document.body.innerHTML = '<div style="text-align:center; padding: 3rem;"><h1>Erro</h1><p>Filial física não informada na URL.</p></div>';
    } else {
      fetch('/api/config')
        .then(res => res.json())
        .then(config => {
          const storeObj = config.stores[storeSlug];
          if (storeObj) {
            document.getElementById('store-title').textContent = storeObj.name;
          } else {
            document.getElementById('store-title').textContent = storeSlug;
          }

          const sectorsList = document.getElementById('sectors-list');
          sectorsList.innerHTML = '';

          // Popula select de setores físicos
          const selectPhysicalSector = document.getElementById('select-physical-sector');
          selectPhysicalSector.innerHTML = '<option value="" disabled selected>Escolha o setor...</option>';

          const icons = {
            acougue: 'fa-drumstick-bite',
            padaria: 'fa-bread-slice',
            rotisseria: 'fa-kitchen-set',
            frios: 'fa-cheese',
            peixaria: 'fa-fish'
          };

          for (const key in config.sectors) {
            const sector = config.sectors[key];

            // Adiciona botão na lista
            const btn = document.createElement('button');
            btn.className = `sector-btn ${key}`;
            btn.innerHTML = `
              <div class="sector-btn-content">
                <i class="fa-solid ${icons[key] || 'fa-tag'} sector-icon"></i>
                <span>${sector.name}</span>
              </div>
              <i class="fa-solid fa-arrow-right arrow-icon"></i>
            `;
            btn.addEventListener('click', () => {
              // Redireciona diretamente para o cliente gerar a senha no setor
              window.location.href = `/cliente/${storeSlug}/${key}`;
            });
            sectorsList.appendChild(btn);

            // Popula select
            const opt = document.createElement('option');
            opt.value = key;
            opt.textContent = sector.name;
            selectPhysicalSector.appendChild(opt);
          }

          // Controle de exibição do formulário
          const btnToggle = document.getElementById('btn-toggle-physical-area');
          const formArea = document.getElementById('form-physical-area');
          btnToggle.addEventListener('click', () => {
            formArea.style.display = formArea.style.display === 'none' ? 'block' : 'none';
          });

          // Controle do envio do formulário de acompanhamento
          const formTrack = document.getElementById('form-track-physical');
          formTrack.addEventListener('submit', (e) => {
            e.preventDefault();
            const sectorKey = selectPhysicalSector.value;
            const number = parseInt(document.getElementById('input-physical-number').value, 10);
            if (!sectorKey || isNaN(number)) return;

            const sectorObj = config.sectors[sectorKey];
            const formatted = `${sectorObj.prefix}${String(number).padStart(3, '0')}`;
            const ticket = {
              number: number,
              formatted: formatted,
              loja: storeSlug,
              sector: sectorKey,
              sectorName: sectorObj.name,
              socketId: null,
              createdAt: Date.now(),
              status: 'waiting',
              subscription: null
            };

            // Armazena no localStorage do cliente como se fosse um ticket ativo
            localStorage.setItem(`filapro_ticket_${storeSlug}_${sectorKey}`, JSON.stringify(ticket));

            // Redireciona para a página do cliente
            window.location.href = `/cliente/${storeSlug}/${sectorKey}`;
          });
        })
        .catch(err => {
          console.error(err);
          document.getElementById('sectors-list').innerHTML = '<div style="color:var(--color-danger)">Erro ao conectar ao servidor.</div>';
        });
    }
  </script>
</body>
</html>
