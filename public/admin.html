<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FilaPro - Dashboard Estatístico</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .dashboard-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }
    @media (max-width: 768px) {
      .dashboard-container { grid-template-columns: 1fr; }
    }
    .chart-card {
      background: var(--bg-dark-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-glass);
      border-radius: var(--border-radius-lg);
      padding: 1.5rem;
      box-shadow: var(--shadow-neon);
    }
    .chart-card h3 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: #fff;
    }
    .kpi-row {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
      width: 100%;
      max-width: 1100px;
    }
    .kpi-card {
      flex: 1;
      background: linear-gradient(135deg, rgba(56,189,248,0.1) 0%, rgba(15,23,42,0.6) 100%);
      border: 1px solid var(--border-glass);
      border-radius: var(--border-radius-lg);
      padding: 1.5rem;
      text-align: center;
    }
    .kpi-value {
      font-size: 2.5rem;
      font-weight: 800;
      color: #38bdf8;
      margin-bottom: 0.5rem;
    }
    .kpi-label {
      font-size: 0.9rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <header>
    <h1><i class="fa-solid fa-chart-pie"></i> FilaPro Dashboard</h1>
    <p>Inteligência e Desempenho da Loja</p>
  </header>

  <main style="max-width: 1100px; justify-content: flex-start; align-items: center; padding-top: 1.5rem; margin: 0 auto;">
    
    <div style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 1.5rem;">
      <a href="/" style="color: var(--text-secondary); text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
      <select id="select-store" style="padding: 0.5rem; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid var(--border-glass); border-radius: 4px;">
        <option value="" disabled selected>Carregando lojas...</option>
      </select>
    </div>

    <!-- Auth Block -->
    <div id="auth-block" class="glass-card" style="width: 100%; max-width: 400px; margin: 2rem auto;">
      <h2 style="margin-bottom: 1rem;">Acesso Administrativo</h2>
      <input type="password" id="input-apikey" placeholder="Chave de Administração (API Key)" style="width: 100%; padding: 0.75rem; margin-bottom: 1rem;">
      <button id="btn-login" class="btn btn-primary" style="width: 100%;">Acessar Dashboard</button>
    </div>

    <!-- Dashboard Content -->
    <div id="dashboard-content" style="display: none; width: 100%;">
      <div class="kpi-row">
        <div class="kpi-card">
          <div class="kpi-value" id="kpi-total">0</div>
          <div class="kpi-label">Senhas Chamadas Hoje</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="kpi-peak">--:--</div>
          <div class="kpi-label">Horário de Pico</div>
        </div>
      </div>

      <div class="dashboard-container">
        <div class="chart-card">
          <h3><i class="fa-solid fa-layer-group"></i> Chamadas por Setor</h3>
          <canvas id="sectorChart"></canvas>
        </div>
        <div class="chart-card">
          <h3><i class="fa-solid fa-clock"></i> Volume por Hora</h3>
          <canvas id="hourChart"></canvas>
        </div>
      </div>
    </div>
  </main>
  
  <script src="/js/admin.js"></script>
</body>
</html>
